services:
  opensearch:
    image: opensearchproject/opensearch:latest@sha256:b5dd1512af2a99748c942cfbbd7f32162623336b210667d0fc6333c6321f171d
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=123849password!P
    ports:
      - "9200:9200"
    networks:
      - proxy

  opensearch-filter-proxy:
    image: opensearch-filter-proxy:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      RUST_LOG: info
    ports:
        - "3000:3000"
    networks:
      - proxy

networks:
  proxy:
