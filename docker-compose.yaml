services:
  opensearch:
    image: opensearchproject/opensearch:latest@sha256:508d340a2fdf8b9707d4f03435fd41b15f617d8b1495120665186f9912853e32
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=123849password!P
    ports:
      - "9200:9200"
    networks:
      - proxy

  opensearch-filter-proxy:
    image: opensearch-filter-proxy:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      RUST_LOG: info
    ports:
        - "3000:3000"
    networks:
      - proxy

networks:
  proxy:
